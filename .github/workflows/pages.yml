name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - assets/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          cp -R assets blocks _site/
          python3 -c 'import json; from pathlib import Path; files = sorted(path.name for path in Path("_site/blocks").glob("block_*.json")); Path("_site/blocks/manifest.json").write_text(json.dumps(files, indent=2) + "\n")'
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
